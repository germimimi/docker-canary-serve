version: '3.8'

services:
  canary:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    container_name: canary-asr-cpu
    ports:
      - "9000:9000"
    environment:
      # Application settings
      APP_HOST: "0.0.0.0"
      APP_PORT: "9000"

      # Default languages (ISO 639-1 codes)
      SOURCE_LANG: "ru"
      TARGET_LANG: "ru"

      # Hugging Face cache directory
      HF_HOME: "/models"

      # Maximum file size (200MB default)
      MAX_FILE_SIZE: "209715200"

    volumes:
      # Persist model files
      - ./models:/models

    restart: unless-stopped

    # Resource limits (adjust based on your system)
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 6G

    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:9000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
